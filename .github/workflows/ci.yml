name: CI

on:
  push:
    branches: ["main", "autobuilder/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb46e645cc58ee5a83a5da # stable 2025-06-01
        with:
          toolchain: "1.85.0"
          components: rustfmt,clippy
      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022cfc676f0ca5fc7 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo check
        run: cargo check --workspace
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test
        run: cargo test --workspace --no-fail-fast
      - name: cargo deny (bans licenses sources)
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          cargo deny check bans licenses sources
